<!DOCTYPE html>
<html lang="${LANG}" class="dark">

<head>
    <meta charset="UTF-8">
    <title>QBT_TR(RSS Feed Options)QBT_TR[CONTEXT=RSSFeedDialog]</title>
    <link rel="stylesheet" href="css/style.css?v=${CACHEID}" type="text/css">
    <script defer src="scripts/localpreferences.js?v=${CACHEID}"></script>
    <script defer src="scripts/color-scheme.js?v=${CACHEID}"></script>
    <script>
        "use strict";

        window.addEventListener("DOMContentLoaded", (event) => {
            window.addEventListener("keydown", (event) => {
                switch (event.key) {
                    case "Enter":
                        event.preventDefault();
                        document.getElementById("submitButton").click();
                        break;
                    case "Escape":
                        event.preventDefault();
                        window.parent.qBittorrent.Client.closeFrameWindow(window);
                        break;
                }
            });

            const searchParams = new URLSearchParams(window.location.search);
            const currentUrl = searchParams.get("url");
            const currentRefreshInterval = Number(searchParams.get("refreshInterval") ?? 0);

            const urlInput = document.getElementById("url");
            const refreshIntervalInput = document.getElementById("newRefreshInterval");
            const refreshIntervalSuffix = document.getElementById("refreshIntervalSuffix");
            const refreshIntervalDefault = document.getElementById("refreshIntervalDefault");
            const submitButton = document.getElementById("submitButton");

            const postRssUpdate = (action, params, errorMessage) =>
                fetch(`api/v2/rss/${action}`, {
                    method: "POST",
                    body: new URLSearchParams(params)
                })
                .then(async (response) => {
                    if (!response.ok) {
                        alert((response.status === 409) ? await response.text() : errorMessage);
                        return false;
                    }
                    return true;
                });

            const closeOnSuccess = () => {
                window.parent.qBittorrent.Rss.updateRssFeedList();
                window.parent.qBittorrent.Client.closeFrameWindow(window);
            };

            const updateRefreshIntervalSuffix = () => {
                if (Number(refreshIntervalInput.value) === 0) {
                    refreshIntervalSuffix.style.display = "none";
                    refreshIntervalDefault.style.display = "inline";
                }
                else {
                    refreshIntervalSuffix.style.display = "inline";
                    refreshIntervalDefault.style.display = "none";
                }
            };

            urlInput.value = currentUrl;
            urlInput.focus();
            urlInput.setSelectionRange(0, currentUrl.length);

            refreshIntervalInput.value = currentRefreshInterval;
            refreshIntervalInput.addEventListener("input", updateRefreshIntervalSuffix);
            updateRefreshIntervalSuffix();

            submitButton.addEventListener("click", (e) => {
                e.preventDefault();
                e.stopPropagation();

                // check field
                const newUrl = urlInput.value.trim();
                const newRefreshInterval = Number(refreshIntervalInput.value);

                if (newUrl === "") {
                    alert("QBT_TR(URL cannot be empty)QBT_TR[CONTEXT=RSSWidget]");
                    return;
                }

                submitButton.disabled = true;

                const feedPath = searchParams.get("path");
                const updates = [];

                if (newRefreshInterval !== currentRefreshInterval) {
                    updates.push(postRssUpdate("setFeedRefreshInterval", { path: feedPath, refreshInterval: newRefreshInterval },
                        "QBT_TR(Unable to update refresh interval)QBT_TR[CONTEXT=RSSWidget]"));
                }

                if (newUrl !== currentUrl) {
                    updates.push(postRssUpdate("setFeedURL", { path: feedPath, url: newUrl },
                        "QBT_TR(Unable to update URL)QBT_TR[CONTEXT=RSSWidget]"));
                }

                if (updates.length === 0) {
                    closeOnSuccess();
                    return;
                }

                Promise.all(updates)
                    .then((results) => {
                        if (results.every(Boolean))
                            closeOnSuccess();
                        else
                            submitButton.disabled = false;
                    });
            });
        });
    </script>
</head>

<body>
    <div style="padding: 10px 10px 0px 10px;">
        <label for="url" style="font-weight: bold;">QBT_TR(URL:)QBT_TR[CONTEXT=RSSFeedDialog]</label>
        <input type="text" id="url" style="width: 320px;">
        <label for="newRefreshInterval" style="font-weight: bold;">QBT_TR(Refresh interval:)QBT_TR[CONTEXT=RSSFeedDialog]</label>
        <input type="number" id="newRefreshInterval" min="0" step="1" value="0" style="width: 6em;">&nbsp;&nbsp;<span id="refreshIntervalSuffix" style="display: none;">QBT_TR( sec)QBT_TR[CONTEXT=RSSFeedDialog]</span><span id="refreshIntervalDefault">(QBT_TR(Default)QBT_TR[CONTEXT=RSSFeedDialog])</span>
        <div style="text-align: center; padding-top: 10px;">
            <input type="button" value="QBT_TR(Save)QBT_TR[CONTEXT=HttpServer]" id="submitButton">
        </div>
    </div>
</body>

</html>
