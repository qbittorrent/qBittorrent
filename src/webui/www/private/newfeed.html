<!DOCTYPE html>
<html lang="${LANG}" class="dark">

<head>
    <meta charset="UTF-8">
    <title>QBT_TR(RSS Feed Options)QBT_TR[CONTEXT=RSSFeedDialog]</title>
    <link rel="stylesheet" href="css/style.css?v=${CACHEID}" type="text/css">
    <script defer src="scripts/localpreferences.js?v=${CACHEID}"></script>
    <script defer src="scripts/color-scheme.js?v=${CACHEID}"></script>
    <script>
        "use strict";

        window.addEventListener("DOMContentLoaded", (event) => {
            const refreshIntervalInput = document.getElementById("refreshInterval");
            const refreshIntervalSuffix = document.getElementById("refreshIntervalSuffix");
            const refreshIntervalDefault = document.getElementById("refreshIntervalDefault");

            window.addEventListener("keydown", (event) => {
                switch (event.key) {
                    case "Enter":
                        event.preventDefault();
                        document.getElementById("submitButton").click();
                        break;
                    case "Escape":
                        event.preventDefault();
                        window.parent.qBittorrent.Client.closeFrameWindow(window);
                        break;
                }
            });

            refreshIntervalInput.addEventListener("input", () => {
                if (Number(refreshIntervalInput.value) === 0) {
                    refreshIntervalSuffix.style.display = "none";
                    refreshIntervalDefault.style.display = "inline";
                }
                else {
                    refreshIntervalSuffix.style.display = "inline";
                    refreshIntervalDefault.style.display = "none";
                }
            });

            document.getElementById("feedURL").focus();
            document.getElementById("submitButton").addEventListener("click", (e) => {
                e.preventDefault();
                e.stopPropagation();

                // check field
                const feedURL = document.getElementById("feedURL").value.trim();
                if (feedURL === "") {
                    alert("QBT_TR(Name cannot be empty)QBT_TR[CONTEXT=HttpServer]");
                    return;
                }

                document.getElementById("submitButton").disabled = true;

                const path = new URLSearchParams(window.location.search).get("path");
                fetch("api/v2/rss/addFeed", {
                        method: "POST",
                        body: new URLSearchParams({
                            url: feedURL,
                            path: (((path !== null) && (path.length > 0)) ? `${path}\\${feedURL}` : ""),
                            refreshInterval: Number(refreshIntervalInput.value)
                        })
                    })
                    .then(async (response) => {
                        if (!response.ok) {
                            if (response.status === 409)
                                alert(await response.text());
                            document.getElementById("submitButton").disabled = false;
                            return;
                        }

                        window.parent.qBittorrent.Rss.updateRssFeedList();
                        window.parent.qBittorrent.Client.closeFrameWindow(window);
                    });
            });
        });
    </script>
</head>

<body>
    <div style="padding: 10px 10px 0px 10px;">
        <label for="feedURL" style="font-weight: bold;">QBT_TR(URL:)QBT_TR[CONTEXT=RSSFeedDialog]</label>
        <input type="text" id="feedURL" style="width: 320px;">
        <label for="refreshInterval" style="font-weight: bold;">QBT_TR(Refresh interval:)QBT_TR[CONTEXT=RSSFeedDialog]</label>
        <input type="number" id="refreshInterval" min="0" step="1" value="0" style="width: 6em;">&nbsp;&nbsp;<span id="refreshIntervalSuffix" style="display: none;">QBT_TR( sec)QBT_TR[CONTEXT=RSSFeedDialog]</span><span id="refreshIntervalDefault">(QBT_TR(Default)QBT_TR[CONTEXT=RSSFeedDialog])</span>
        <div style="text-align: center; padding-top: 10px;">
            <input type="button" value="QBT_TR(OK)QBT_TR[CONTEXT=HttpServer]" id="submitButton">
        </div>
    </div>
</body>

</html>
