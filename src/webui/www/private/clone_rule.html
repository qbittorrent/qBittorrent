<!DOCTYPE html>
<html lang="${LANG}" class="dark">

<head>
    <meta charset="UTF-8">
    <title>QBT_TR(Rule cloning)QBT_TR[CONTEXT=AutomatedRssDownloader]</title>
    <link rel="stylesheet" href="css/style.css?v=${CACHEID}" type="text/css">
    <script defer src="scripts/localpreferences.js?v=${CACHEID}"></script>
    <script defer src="scripts/color-scheme.js?v=${CACHEID}"></script>
    <script>
        "use strict";

        window.addEventListener("DOMContentLoaded", (event) => {
            window.addEventListener("keydown", (event) => {
                switch (event.key) {
                    case "Enter":
                        event.preventDefault();
                        document.getElementById("cloneButton").click();
                        break;
                    case "Escape":
                        event.preventDefault();
                        window.parent.qBittorrent.Client.closeFrameWindow(window);
                        break;
                }
            });

            const sourceName = new URLSearchParams(window.location.search).get("rule");

            document.getElementById("clone").value = sourceName;
            document.getElementById("clone").focus();
            document.getElementById("clone").setSelectionRange(0, sourceName.length);

            document.getElementById("cloneButton").addEventListener("click", (e) => {
                e.preventDefault();
                e.stopPropagation();

                // check field
                const cloneName = document.getElementById("clone").value.trim();
                if (cloneName === "") {
                    alert("QBT_TR(Name cannot be empty)QBT_TR[CONTEXT=HttpServer]");
                    return;
                }

                if (cloneName === sourceName) {
                    alert("QBT_TR(Name is unchanged)QBT_TR[CONTEXT=HttpServer]");
                    return;
                }

                document.getElementById("cloneButton").disabled = true;

                fetch("api/v2/rss/cloneRule", {
                        method: "POST",
                        body: new URLSearchParams({
                            sourceName: sourceName,
                            cloneName: cloneName
                        })
                    })
                    .then((response) => {
                        if (!response.ok)
                            return;

                        window.parent.qBittorrent.RssDownloader.updateRulesList();
                        window.parent.qBittorrent.Client.closeFrameWindow(window);
                    });
            });
        });
    </script>
</head>

<body>
    <div style="padding: 10px 10px 0px 10px;">
        <label for="clone">QBT_TR(Please type the name for the clone of the download rule)QBT_TR[CONTEXT=AutomatedRssDownloader]</label>
        <input type="text" id="clone" style="width: 320px;">
        <div id="cloneInformation">
            QBT_TR(The cloned rule will be set as disabled and the downloaded episodes history will be cleared)QBT_TR[CONTEXT=AutomatedRssDownloader]
        </div>
        <div style="text-align: center; padding-top: 10px;">
            <input type="button" value="QBT_TR(Save)QBT_TR[CONTEXT=HttpServer]" id="cloneButton">
        </div>
    </div>
</body>

</html>
